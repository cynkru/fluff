name: Build Flutter Release (Manual)

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: 'Build name/version (e.g., 1.0.0)'
        required: true
        default: '1.0.0'
      build_number:
        description: 'Build number'
        required: true
        default: '1'
      platform:
        description: 'Platform to build'
        required: true
        type: choice
        options:
          - all
          - android
          - ios
          - linux
          - web
          - windows

env:
  FLUTTER_VERSION: '3.x'
  GRADLE_OPTS: -Xmx6g -Xms4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
  JAVA_OPTS: -Xmx6g -Xms4g -XX:MaxMetaspaceSize=1g

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      repository: ${{ steps.repo.outputs.repository }}
      branch: ${{ steps.repo.outputs.branch }}
      cache_key: ${{ steps.cache_key.outputs.key }}
      gitea_url: ${{ steps.gitea_info.outputs.gitea_url }}
      gitea_token: ${{ steps.gitea_info.outputs.gitea_token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get repository info
        id: repo
        run: |
          echo "repository=${GITHUB_REPOSITORY}" >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
      
      - name: Get Gitea info
        id: gitea_info
        run: |
          # Получаем URL Gitea из GITHUB_SERVER_URL
          GITEA_URL="${GITHUB_SERVER_URL}"
          # Удаляем trailing slash если есть
          GITEA_URL=$(echo "$GITEA_URL" | sed 's:/*$::')
          echo "gitea_url=$GITEA_URL" >> $GITHUB_OUTPUT
          echo "Using Gitea URL: $GITEA_URL"
          
          # Пробуем получить токен из стандартных переменных Gitea
          # В Gitea Actions токен автоматически доступен как GITHUB_TOKEN
          if [ -n "${GITHUB_TOKEN}" ]; then
            echo "gitea_token=${GITHUB_TOKEN}" >> $GITHUB_OUTPUT
            echo "Token found in GITHUB_TOKEN"
          else
            echo "gitea_token=" >> $GITHUB_OUTPUT
            echo "No token found"
          fi
      
      - name: Generate cache key
        id: cache_key
        run: |
          if [ -f "pubspec.lock" ]; then
            CACHE_KEY="${{ runner.os }}-flutter-${{ hashFiles('pubspec.lock') }}"
          else
            CACHE_KEY="${{ runner.os }}-flutter-${{ hashFiles('pubspec.yaml') }}"
          fi
          echo "key=$CACHE_KEY" >> $GITHUB_OUTPUT
          echo "Cache key: $CACHE_KEY"

  build-android:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android' }}
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
    
      - name: Setup Java
        run: |
          if ! java -version 2>&1 | grep -q "version \"17"; then
            echo "Java 17 not found, installing..."
            sudo apt update
            sudo apt install -y openjdk-17-jdk
          else
            echo "Java 17 already installed"
          fi
          
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          java -version
          javac -version
            
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-version: '34'
          build-tools-version: '34.0.0'
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
    
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
    
      - name: Install dependencies
        run: flutter pub get
    
      - name: Update receive_sharing_intent
        run: flutter pub upgrade receive_sharing_intent
    
      - name: Configure compatibility
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties << EOF
          org.gradle.jvmargs=-Xmx4608m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8
          org.gradle.daemon=false
          org.gradle.parallel=true
          org.gradle.workers.max=2
          android.useAndroidX=true
          android.enableJetifier=true
          kotlin.jvm.target=11
          EOF
        
          if [ -f "android/app/build.gradle.kts" ]; then
            sed -i '/android {/a \ \ \ \ compileOptions {\n\ \ \ \ \ \ \ \ sourceCompatibility = JavaVersion.VERSION_11\n\ \ \ \ \ \ \ \ targetCompatibility = JavaVersion.VERSION_11\n\ \ \ \ }\n\ \ \ \ kotlinOptions {\n\ \ \ \ \ \ \ \ jvmTarget = "11"\n\ \ \ \ }' android/app/build.gradle.kts
          fi
    
      - name: Build Android APK
        run: flutter build apk --release
    
      - name: Fallback with compatibility flags
        if: failure()
        run: |
          cd android
          ./gradlew assembleDebug \
            -Dorg.gradle.java.home=/opt/hostedtoolcache/Java_Zulu_jdk/11.0.30-7/x64 \
            -Pkotlin.jvm.target=11 \
            --max-workers=2 \
            --no-daemon
    
      - name: Upload Android artifacts to Gitea
        if: always() && needs.prepare.outputs.gitea_token != ''
        env:
          GITEA_URL: ${{ needs.prepare.outputs.gitea_url }}
          GITEA_TOKEN: ${{ needs.prepare.outputs.gitea_token }}
        run: |
          if ! command -v curl &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y curl
          fi
          
          mkdir -p artifacts/android
          find . -name "*.apk" -exec cp {} artifacts/android/ \;
          
          cd artifacts
          ARCHIVE_NAME="android-build-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}.zip"
          zip -r "$ARCHIVE_NAME" android/
          
          if [ -f "$ARCHIVE_NAME" ]; then
            echo "Uploading to $GITEA_URL/api/v1/repos/${{ github.repository }}/releases"
            
            TAG_NAME="build-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}"
            
            # Создаем релиз (если существует - проигнорируем ошибку)
            curl -X POST \
              -H "Authorization: token $GITEA_TOKEN" \
              -H "Accept: application/json" \
              -H "Content-Type: application/json" \
              -d "{
                \"tag_name\": \"$TAG_NAME\",
                \"target_commitish\": \"${{ github.sha }}\",
                \"name\": \"Build ${{ github.event.inputs.build_name }} (${{ github.event.inputs.build_number }})\",
                \"body\": \"Automated build for Android\",
                \"draft\": false,
                \"prerelease\": false
              }" \
              "$GITEA_URL/api/v1/repos/${{ github.repository }}/releases" || true
            
            # Загружаем файл
            curl -X POST \
              -H "Authorization: token $GITEA_TOKEN" \
              -F "file=@$ARCHIVE_NAME" \
              "$GITEA_URL/api/v1/repos/${{ github.repository }}/releases/tags/$TAG_NAME/assets"
          fi

  build-ios:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ios' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
      
      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
            .flutter-plugins
            .flutter-plugins-dependencies
          key: ${{ needs.prepare.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-flutter-
      
      - name: Install dependencies
        run: flutter pub get
        
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/.cocoapods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-
      
      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update || pod install --verbose
      
      - name: Build iOS (debug, no codesign)
        run: |
          flutter build ios --release --no-codesign --verbose
      
      - name: Create iOS artifact archive
        run: |
          cd build/ios/iphoneos
          zip -r ../../../ios-build.zip Runner.app
      
      - name: Upload iOS artifacts to Gitea
        if: always() && needs.prepare.outputs.gitea_token != ''
        env:
          GITEA_URL: ${{ needs.prepare.outputs.gitea_url }}
          GITEA_TOKEN: ${{ needs.prepare.outputs.gitea_token }}
        run: |
          if [ -f "ios-build.zip" ]; then
            TAG_NAME="build-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}"
            ARCHIVE_NAME="ios-build-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}.zip"
            
            mv ios-build.zip "$ARCHIVE_NAME"
            
            curl -X POST \
              -H "Authorization: token $GITEA_TOKEN" \
              -F "file=@$ARCHIVE_NAME" \
              "$GITEA_URL/api/v1/repos/${{ github.repository }}/releases/tags/$TAG_NAME/assets"
          fi

  build-linux:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
            .flutter-plugins
            .flutter-plugins-dependencies
          key: ${{ needs.prepare.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-flutter-
      
      - name: Install all Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsecret-1-dev \
            libjsoncpp-dev \
            liblzma-dev \
            pkg-config \
            libssl-dev \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libgl1-mesa-dev
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
          
      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop
        
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Linux (debug)
        run: flutter build linux --release
        
      - name: Create tar.gz archive
        run: |
          if [ -d "build/linux/x64/debug/bundle" ]; then
            cd build/linux/x64/debug/bundle
            tar -czf ../../../../../linux-build.tar.gz .
          fi
      
      - name: Upload Linux artifacts to Gitea
        if: always() && needs.prepare.outputs.gitea_token != ''
        env:
          GITEA_URL: ${{ needs.prepare.outputs.gitea_url }}
          GITEA_TOKEN: ${{ needs.prepare.outputs.gitea_token }}
        run: |
          if [ -f "linux-build.tar.gz" ]; then
            TAG_NAME="build-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}"
            ARCHIVE_NAME="linux-build-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}.tar.gz"
            
            mv linux-build.tar.gz "$ARCHIVE_NAME"
            
            curl -X POST \
              -H "Authorization: token $GITEA_TOKEN" \
              -F "file=@$ARCHIVE_NAME" \
              "$GITEA_URL/api/v1/repos/${{ github.repository }}/releases/tags/$TAG_NAME/assets"
          fi

  build-windows:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~\.pub-cache
            .dart_tool
            .flutter-plugins
            .flutter-plugins-dependencies
          key: ${{ needs.prepare.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-flutter-
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
          
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop
        
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Windows (debug)
        run: flutter build windows --release
        
      - name: Create Windows archive
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath windows-build.zip
      
      - name: Upload Windows artifacts to Gitea
        if: always() && needs.prepare.outputs.gitea_token != ''
        shell: bash
        env:
          GITEA_URL: ${{ needs.prepare.outputs.gitea_url }}
          GITEA_TOKEN: ${{ needs.prepare.outputs.gitea_token }}
        run: |
          if [ -f "windows-build.zip" ]; then
            TAG_NAME="build-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}"
            ARCHIVE_NAME="windows-build-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}.zip"
            
            mv windows-build.zip "$ARCHIVE_NAME"
            
            curl -X POST \
              -H "Authorization: token $GITEA_TOKEN" \
              -F "file=@$ARCHIVE_NAME" \
              "$GITEA_URL/api/v1/repos/${{ github.repository }}/releases/tags/$TAG_NAME/assets"
          fi

  build-web:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'web' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
            .flutter-plugins
            .flutter-plugins-dependencies
          key: ${{ needs.prepare.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-flutter-
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Web (debug)
        run: flutter build web --release
        
      - name: Create Web archive
        run: |
          cd build/web
          zip -r ../../web-build.zip .
      
      - name: Upload Web artifacts to Gitea
        if: always() && needs.prepare.outputs.gitea_token != ''
        env:
          GITEA_URL: ${{ needs.prepare.outputs.gitea_url }}
          GITEA_TOKEN: ${{ needs.prepare.outputs.gitea_token }}
        run: |
          if [ -f "web-build.zip" ]; then
            TAG_NAME="build-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}"
            ARCHIVE_NAME="web-build-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}.zip"
            
            mv web-build.zip "$ARCHIVE_NAME"
            
            curl -X POST \
              -H "Authorization: token $GITEA_TOKEN" \
              -F "file=@$ARCHIVE_NAME" \
              "$GITEA_URL/api/v1/repos/${{ github.repository }}/releases/tags/$TAG_NAME/assets"
          fi

  summary:
    needs: [prepare, build-android, build-ios, build-linux, build-windows, build-web]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Build Summary
        run: |
          echo "========================================="
          echo "     BUILD COMPLETE"
          echo "========================================="
          echo ""
          echo "Repository: ${{ needs.prepare.outputs.repository }}"
          echo "Branch: ${{ needs.prepare.outputs.branch }}"
          echo "Build Name: ${{ github.event.inputs.build_name }}"
          echo "Build Number: ${{ github.event.inputs.build_number }}"
          echo "Gitea URL: ${{ needs.prepare.outputs.gitea_url }}"
          echo ""
          echo "Build Status:"
          echo "  Android: ${{ needs.build-android.result }}"
          echo "  iOS: ${{ needs.build-ios.result }}"
          echo "  Linux: ${{ needs.build-linux.result }}"
          echo "  Windows: ${{ needs.build-windows.result }}"
          echo "  Web: ${{ needs.build-web.result }}"
          echo ""
          if [ -n "${{ needs.prepare.outputs.gitea_token }}" ]; then
            echo "✅ Artifacts uploaded to Gitea Releases"
            echo "Tag: build-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}"
            echo "URL: ${{ needs.prepare.outputs.gitea_url }}/${{ github.repository }}/releases/tag/build-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}"
          else
            echo "⚠️ No token available - artifacts not uploaded"
            echo "Gitea automatically provides GITHUB_TOKEN for authentication"
          fi
          echo "========================================="