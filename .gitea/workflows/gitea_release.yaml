name: Build Flutter Release (Manual)

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: 'Build name/version (e.g., 1.0.0)'
        required: true
        default: '1.0.0'
      build_number:
        description: 'Build number'
        required: true
        default: '1'
      platform:
        description: 'Platform to build'
        required: true
        type: choice
        options:
          - all
          - android
          - ios
          - linux
          - web
          - windows

env:
  FLUTTER_VERSION: '3.x'
  # Увеличиваем память для всех Gradle операций
  GRADLE_OPTS: -Xmx6g -Xms4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
  JAVA_OPTS: -Xmx6g -Xms4g -XX:MaxMetaspaceSize=1g

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      repository: ${{ steps.repo.outputs.repository }}
      branch: ${{ steps.repo.outputs.branch }}
      cache_key: ${{ steps.cache_key.outputs.key }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get repository info
        id: repo
        run: |
          echo "repository=${GITHUB_REPOSITORY}" >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
      
      - name: Generate cache key
        id: cache_key
        run: |
          # Создаем ключ кеша на основе pubspec.lock и важных файлов
          if [ -f "pubspec.lock" ]; then
            CACHE_KEY="${{ runner.os }}-flutter-${{ hashFiles('pubspec.lock') }}"
          else
            CACHE_KEY="${{ runner.os }}-flutter-${{ hashFiles('pubspec.yaml') }}"
          fi
          echo "key=$CACHE_KEY" >> $GITHUB_OUTPUT
          echo "Cache key: $CACHE_KEY"

  build-android:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android' }}
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
    
      # Ставим Java 17 для Gradle (основная)
      - name: Setup Java
        run: |
          # Проверяем, установлена ли Java 17
          if ! java -version 2>&1 | grep -q "version \"17"; then
            echo "Java 17 not found, installing..."
            sudo apt update
            sudo apt install -y openjdk-17-jdk
          else
            echo "Java 17 already installed"
          fi
          
          # Устанавливаем JAVA_HOME
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> ~/.bashrc
          
          # Проверяем версию
          java -version
          javac -version
            
      - name: Setup Android SDK
        uses: actions/setup-android@v4
        with:
          sdk-version: '34'
          build-tools-version: '34.0.0'
        
      - name: Setup Flutter
        uses: actions/setup-flutter@v4
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
    
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
    
      - name: Install dependencies
        run: flutter pub get
    
      # Обновляем receive_sharing_intent до последней версии
      - name: Update receive_sharing_intent
        run: |
          # Форсируем последнюю версию плагина
          flutter pub upgrade receive_sharing_intent
    
      # Конфигурируем для совместимости
      - name: Configure compatibility
        run: |
          # Создаем gradle.properties с явным указанием Java для компиляции
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties << EOF
          org.gradle.jvmargs=-Xmx4608m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8
          org.gradle.daemon=false
          org.gradle.parallel=true
          org.gradle.workers.max=2
          android.useAndroidX=true
          android.enableJetifier=true
        
          # Явно указываем Java 11 для компиляции Kotlin/Java кода
          # но Gradle сам остается на Java 17
          kotlin.jvm.target=11
          EOF
        
          # Патчим build.gradle.kts если нужно
          if [ -f "android/app/build.gradle.kts" ]; then
            # Добавляем совместимость в kotlinOptions
            sed -i '/android {/a \ \ \ \ compileOptions {\n\ \ \ \ \ \ \ \ sourceCompatibility = JavaVersion.VERSION_11\n\ \ \ \ \ \ \ \ targetCompatibility = JavaVersion.VERSION_11\n\ \ \ \ }\n\ \ \ \ kotlinOptions {\n\ \ \ \ \ \ \ \ jvmTarget = "11"\n\ \ \ \ }' android/app/build.gradle.kts
          fi
    
      # Пробуем собрать
      - name: Build Android APK
        run: flutter build apk --release
    
      # Если упало - пробуем с форсированной совместимостью
      - name: Fallback with compatibility flags
        if: failure()
        run: |
          # Пробуем явно указать Java 11 для тасков
          cd android
          ./gradlew assembleDebug \
            -Dorg.gradle.java.home=/opt/hostedtoolcache/Java_Zulu_jdk/11.0.30-7/x64 \
            -Pkotlin.jvm.target=11 \
            --max-workers=2 \
            --no-daemon
    
      # Загрузка артефактов в Gitea Releases
      - name: Upload Android artifacts to Gitea
        if: always()
        run: |
          # Устанавливаем curl если не установлен
          if ! command -v curl &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y curl
          fi
          
          # Создаем временную директорию для артефактов
          mkdir -p artifacts/android
          
          # Копируем все найденные APK файлы
          find . -name "*.apk" -exec cp {} artifacts/android/ \;
          
          # Создаем архив для загрузки
          cd artifacts
          zip -r "android-build-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}.zip" android/
          
          # Загружаем артефакт на Gitea
          if [ -f "android-build-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}.zip" ]; then
            curl -X POST \
              -H "Authorization: token ${{ secrets.GITEA_TOKEN }}" \
              -H "Content-Type: multipart/form-data" \
              -F "file=@android-build-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}.zip" \
              "${{ vars.GITEA_URL }}/api/v1/repos/${{ github.repository }}/releases"
          fi

  build-ios:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ios' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: actions/setup-flutter@v4
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
      
      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
            .flutter-plugins
            .flutter-plugins-dependencies
          key: ${{ needs.prepare.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-flutter-
      
      - name: Install dependencies
        run: flutter pub get
        
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/.cocoapods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-
      
      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update || pod install --verbose
      
      - name: Build iOS (debug, no codesign)
        run: |
          flutter build ios --release --no-codesign --verbose
      
      - name: Create iOS artifact archive
        run: |
          cd build/ios/iphoneos
          zip -r ../../../ios-build.zip Runner.app
      
      # Загрузка артефактов в Gitea Releases
      - name: Upload iOS artifacts to Gitea
        if: always()
        run: |
          if [ -f "ios-build.zip" ]; then
            curl -X POST \
              -H "Authorization: token ${{ secrets.GITEA_TOKEN }}" \
              -H "Content-Type: multipart/form-data" \
              -F "file=@ios-build.zip" \
              -F "name=ios-build-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}.zip" \
              "${{ vars.GITEA_URL }}/api/v1/repos/${{ github.repository }}/releases"
          fi

  build-linux:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
            .flutter-plugins
            .flutter-plugins-dependencies
          key: ${{ needs.prepare.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-flutter-
      
      - name: Install all Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsecret-1-dev \
            libjsoncpp-dev \
            liblzma-dev \
            pkg-config \
            libssl-dev \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libgl1-mesa-dev
          
      - name: Setup Flutter
        uses: actions/setup-flutter@v4
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
          
      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop
        
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Linux (debug)
        run: flutter build linux --release
        
      - name: Create tar.gz archive
        run: |
          if [ -d "build/linux/x64/debug/bundle" ]; then
            cd build/linux/x64/debug/bundle
            tar -czf ../../../../../linux-build.tar.gz .
          fi
      
      # Загрузка артефактов в Gitea Releases
      - name: Upload Linux artifacts to Gitea
        if: always()
        run: |
          if [ -f "linux-build.tar.gz" ]; then
            curl -X POST \
              -H "Authorization: token ${{ secrets.GITEA_TOKEN }}" \
              -H "Content-Type: multipart/form-data" \
              -F "file=@linux-build.tar.gz" \
              -F "name=linux-build-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}.tar.gz" \
              "${{ vars.GITEA_URL }}/api/v1/repos/${{ github.repository }}/releases"
          fi

  build-windows:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~\.pub-cache
            .dart_tool
            .flutter-plugins
            .flutter-plugins-dependencies
          key: ${{ needs.prepare.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-flutter-
      
      - name: Setup Flutter
        uses: actions/setup-flutter@v4
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
          
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop
        
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Windows (debug)
        run: flutter build windows --release
        
      - name: Create Windows archive
        run: |
          Compress-Archive -Path build/windows/x64/runner/Debug/* -DestinationPath windows-build.zip
      
      # Загрузка артефактов в Gitea Releases
      - name: Upload Windows artifacts to Gitea
        if: always()
        shell: bash
        run: |
          if [ -f "windows-build.zip" ]; then
            curl -X POST \
              -H "Authorization: token ${{ secrets.GITEA_TOKEN }}" \
              -H "Content-Type: multipart/form-data" \
              -F "file=@windows-build.zip" \
              -F "name=windows-build-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}.zip" \
              "${{ vars.GITEA_URL }}/api/v1/repos/${{ github.repository }}/releases"
          fi

  build-web:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'web' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
            .flutter-plugins
            .flutter-plugins-dependencies
          key: ${{ needs.prepare.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-flutter-
      
      - name: Setup Flutter
        uses: actions/setup-flutter@v4
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Web (debug)
        run: flutter build web --release
        
      - name: Create Web archive
        run: |
          cd build/web
          zip -r ../../web-build.zip .
      
      # Загрузка артефактов в Gitea Releases
      - name: Upload Web artifacts to Gitea
        if: always()
        run: |
          if [ -f "web-build.zip" ]; then
            curl -X POST \
              -H "Authorization: token ${{ secrets.GITEA_TOKEN }}" \
              -H "Content-Type: multipart/form-data" \
              -F "file=@web-build.zip" \
              -F "name=web-build-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}.zip" \
              "${{ vars.GITEA_URL }}/api/v1/repos/${{ github.repository }}/releases"
          fi

  summary:
    needs: [prepare, build-android, build-ios, build-linux, build-windows, build-web]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send notification (optional)
        run: |
          echo "Build complete! Artifacts uploaded to Gitea releases"
          echo ""
          echo "Repository: ${{ needs.prepare.outputs.repository }}"
          echo "Branch: ${{ needs.prepare.outputs.branch }}"
          echo "Build Name: ${{ github.event.inputs.build_name }}"
          echo "Build Number: ${{ github.event.inputs.build_number }}"
          echo ""
          echo "Build Status:"
          echo "Android: ${{ needs.build-android.result }}"
          echo "iOS: ${{ needs.build-ios.result }}"
          echo "Linux: ${{ needs.build-linux.result }}"
          echo "Windows: ${{ needs.build-windows.result }}"
          echo "Web: ${{ needs.build-web.result }}"