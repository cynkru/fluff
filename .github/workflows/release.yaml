name: Build Flutter App (Release)

on:
  # Автоматический запуск при создании релиза
  release:
    types: [published]

env:
  FLUTTER_VERSION: '3.x'
  # Увеличиваем память для всех Gradle операций
  GRADLE_OPTS: -Xmx6g -Xms4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
  JAVA_OPTS: -Xmx6g -Xms4g -XX:MaxMetaspaceSize=1g

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      repository: ${{ steps.repo.outputs.repository }}
      branch: ${{ steps.repo.outputs.branch }}
      cache_key: ${{ steps.cache_key.outputs.key }}
      build_name: ${{ steps.version.outputs.build_name }}
      build_number: ${{ steps.version.outputs.build_number }}
      release_tag: ${{ steps.release.outputs.tag }}
      release_name: ${{ steps.release.outputs.name }}
      release_body: ${{ steps.release.outputs.body }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get repository info
        id: repo
        run: |
          echo "repository=${GITHUB_REPOSITORY}" >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
      
      - name: Get release info
        id: release
        run: |
          # Извлекаем версию из тега релиза (убираем 'v' если есть)
          VERSION="${GITHUB_REF_NAME#v}"
          echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          echo "name=${{ github.event.release.name }}" >> $GITHUB_OUTPUT
          echo "body=${{ github.event.release.body }}" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
      - name: Set version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "build_name=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT
          echo "Using release version: $VERSION (build ${GITHUB_RUN_NUMBER})"
      
      - name: Generate cache key
        id: cache_key
        run: |
          # Создаем ключ кеша на основе pubspec.lock и важных файлов
          if [ -f "pubspec.lock" ]; then
            CACHE_KEY="${{ runner.os }}-flutter-${{ hashFiles('pubspec.lock') }}"
          else
            CACHE_KEY="${{ runner.os }}-flutter-${{ hashFiles('pubspec.yaml') }}"
          fi
          echo "key=$CACHE_KEY" >> $GITHUB_OUTPUT
          echo "Cache key: $CACHE_KEY"

  build-android:
    needs: prepare
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
    
      # Ставим Java 17 для Gradle (основная)
      - name: Setup Java
        run: |
          # Проверяем, установлена ли Java 17
          if ! java -version 2>&1 | grep -q "version \"17"; then
            echo "Java 17 not found, installing..."
            sudo apt update
            sudo apt install -y openjdk-17-jdk
          else
            echo "Java 17 already installed"
          fi
          
          # Устанавливаем JAVA_HOME
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> ~/.bashrc
          
          # Проверяем версию
          java -version
          javac -version
            
      - name: Setup Android SDK
        uses: amyu/setup-android@v5
        with:
          sdk-version: '34'
          build-tools-version: '34.0.0'
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
    
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
    
      - name: Install dependencies
        run: flutter pub get
    
      # Обновляем receive_sharing_intent до последней версии
      - name: Update receive_sharing_intent
        run: |
          # Форсируем последнюю версию плагина
          flutter pub upgrade receive_sharing_intent
    
      # Конфигурируем для совместимости
      - name: Configure compatibility
        run: |
          # Создаем gradle.properties с явным указанием Java для компиляции
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties << EOF
          org.gradle.jvmargs=-Xmx4608m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8
          org.gradle.daemon=false
          org.gradle.parallel=true
          org.gradle.workers.max=2
          android.useAndroidX=true
          android.enableJetifier=true
        
          # Явно указываем Java 11 для компиляции Kotlin/Java кода
          # но Gradle сам остается на Java 17
          kotlin.jvm.target=11
          EOF
        
          # Патчим build.gradle.kts если нужно
          if [ -f "android/app/build.gradle.kts" ]; then
            # Добавляем совместимость в kotlinOptions
            sed -i '/android {/a \ \ \ \ compileOptions {\n\ \ \ \ \ \ \ \ sourceCompatibility = JavaVersion.VERSION_11\n\ \ \ \ \ \ \ \ targetCompatibility = JavaVersion.VERSION_11\n\ \ \ \ }\n\ \ \ \ kotlinOptions {\n\ \ \ \ \ \ \ \ jvmTarget = "11"\n\ \ \ \ }' android/app/build.gradle.kts
          fi
    
      # Сборка релизной версии
      - name: Build Android APK (Release)
        run: flutter build apk --release --build-name=${{ needs.prepare.outputs.build_name }} --build-number=${{ needs.prepare.outputs.build_number }}
    
      # Если упало - пробуем с форсированной совместимостью
      - name: Fallback with compatibility flags
        if: failure()
        run: |
          # Пробуем явно указать Java 11 для тасков
          cd android
          ./gradlew assembleRelease \
            -Dorg.gradle.java.home=/opt/hostedtoolcache/Java_Zulu_jdk/11.0.30-7/x64 \
            -Pkotlin.jvm.target=11 \
            --max-workers=2 \
            --no-daemon
    
      - name: Prepare Android artifacts for upload
        run: |
          mkdir -p release-artifacts/android
          # Копируем все APK файлы в одну папку
          find . -name "*.apk" -exec cp {} release-artifacts/android/ \;
          
      - name: Upload Android artifacts (temporary)
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ needs.prepare.outputs.build_name }}
          path: release-artifacts/android/
          retention-days: 1

  build-ios:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
      
      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
            .flutter-plugins
            .flutter-plugins-dependencies
          key: ${{ needs.prepare.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-flutter-
      
      - name: Install dependencies
        run: flutter pub get
        
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/.cocoapods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-
      
      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update || pod install --verbose
      
      - name: Build iOS (release, no codesign)
        run: |
          flutter build ios --release --no-codesign \
            --build-name=${{ needs.prepare.outputs.build_name }} \
            --build-number=${{ needs.prepare.outputs.build_number }} \
            --verbose
      
      - name: Prepare iOS artifacts
        run: |
          mkdir -p release-artifacts/ios
          cd build/ios/iphoneos
          zip -r ../../release-artifacts/ios/Runner.zip Runner.app
          
      - name: Upload iOS artifacts (temporary)
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ needs.prepare.outputs.build_name }}
          path: release-artifacts/ios/
          retention-days: 1

  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
            .flutter-plugins
            .flutter-plugins-dependencies
          key: ${{ needs.prepare.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-flutter-
      
      - name: Install all Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsecret-1-dev \
            libjsoncpp-dev \
            liblzma-dev \
            pkg-config \
            libssl-dev \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libgl1-mesa-dev
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
          
      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop
        
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Linux (release)
        run: flutter build linux --release
        
      - name: Prepare Linux artifacts
        run: |
          mkdir -p release-artifacts/linux
          if [ -d "build/linux/x64/release/bundle" ]; then
            cd build/linux/x64/release/bundle
            tar -czf ../../../release-artifacts/linux/linux-build.tar.gz .
          fi
          
      - name: Upload Linux artifacts (temporary)
        uses: actions/upload-artifact@v4
        with:
          name: linux-build-${{ needs.prepare.outputs.build_name }}
          path: release-artifacts/linux/
          retention-days: 1
          if-no-files-found: ignore

  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~\.pub-cache
            .dart_tool
            .flutter-plugins
            .flutter-plugins-dependencies
          key: ${{ needs.prepare.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-flutter-
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
          
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop
        
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Windows (release)
        run: flutter build windows --release
        
      - name: Prepare Windows artifacts
        run: |
          mkdir release-artifacts\windows
          xcopy /E /I build\windows\x64\runner\Release release-artifacts\windows\
          cd release-artifacts\windows
          powershell Compress-Archive -Path * -DestinationPath ..\windows-build.zip
          
      - name: Upload Windows artifacts (temporary)
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-${{ needs.prepare.outputs.build_name }}
          path: release-artifacts/windows-build.zip
          retention-days: 1

  build-web:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
            .flutter-plugins
            .flutter-plugins-dependencies
          key: ${{ needs.prepare.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-flutter-
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Web (release)
        run: flutter build web --release
        
      - name: Prepare Web artifacts
        run: |
          mkdir -p release-artifacts/web
          cp -r build/web/* release-artifacts/web/
          cd release-artifacts
          tar -czf web-build.tar.gz web/
          
      - name: Upload Web artifacts (temporary)
        uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ needs.prepare.outputs.build_name }}
          path: release-artifacts/web-build.tar.gz
          retention-days: 1

  upload-to-release:
    needs: [prepare, build-android, build-ios, build-linux, build-windows, build-web]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          
      - name: Prepare files for release
        run: |
          mkdir -p release-files
          
          # Переименовываем файлы для красоты
          if [ -d "artifacts/android-build-${{ needs.prepare.outputs.build_name }}" ]; then
            find "artifacts/android-build-${{ needs.prepare.outputs.build_name }}" -name "*.apk" -exec cp {} release-files/ \;
            # Переименовываем APK для ясности
            cd release-files
            for apk in *.apk; do
              mv "$apk" "android-${{ needs.prepare.outputs.build_name }}-$apk" 2>/dev/null || true
            done
            cd ..
          fi
          
          if [ -f "artifacts/ios-build-${{ needs.prepare.outputs.build_name }}/Runner.zip" ]; then
            cp "artifacts/ios-build-${{ needs.prepare.outputs.build_name }}/Runner.zip" "release-files/ios-${{ needs.prepare.outputs.build_name }}.zip"
          fi
          
          if [ -f "artifacts/linux-build-${{ needs.prepare.outputs.build_name }}/linux-build.tar.gz" ]; then
            cp "artifacts/linux-build-${{ needs.prepare.outputs.build_name }}/linux-build.tar.gz" "release-files/linux-${{ needs.prepare.outputs.build_name }}.tar.gz"
          fi
          
          if [ -f "artifacts/windows-build-${{ needs.prepare.outputs.build_name }}/windows-build.zip" ]; then
            cp "artifacts/windows-build-${{ needs.prepare.outputs.build_name }}/windows-build.zip" "release-files/windows-${{ needs.prepare.outputs.build_name }}.zip"
          fi
          
          if [ -f "artifacts/web-build-${{ needs.prepare.outputs.build_name }}/web-build.tar.gz" ]; then
            cp "artifacts/web-build-${{ needs.prepare.outputs.build_name }}/web-build.tar.gz" "release-files/web-${{ needs.prepare.outputs.build_name }}.tar.gz"
          fi
          
          echo "Files prepared for release:"
          ls -la release-files/
          
      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-files/*
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: ${{ needs.prepare.outputs.release_name }}
          body: ${{ needs.prepare.outputs.release_body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  summary:
    needs: [prepare, build-android, build-ios, build-linux, build-windows, build-web, upload-to-release]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Create build summary
        run: |
          # Собираем статусы
          ANDROID_STATUS="${{ needs.build-android.result }}"
          IOS_STATUS="${{ needs.build-ios.result }}"
          LINUX_STATUS="${{ needs.build-linux.result }}"
          WINDOWS_STATUS="${{ needs.build-windows.result }}"
          WEB_STATUS="${{ needs.build-web.result }}"
          UPLOAD_STATUS="${{ needs.upload-to-release.result }}"
          
          # Определяем общий статус
          if [[ "$ANDROID_STATUS" == "success" || "$IOS_STATUS" == "success" || "$LINUX_STATUS" == "success" || "$WINDOWS_STATUS" == "success" || "$WEB_STATUS" == "success" ]]; then
            if [[ "$ANDROID_STATUS" == "success" && "$IOS_STATUS" == "success" && "$LINUX_STATUS" == "success" && "$WINDOWS_STATUS" == "success" && "$WEB_STATUS" == "success" && "$UPLOAD_STATUS" == "success" ]]; then
              OVERALL_STATUS="✅ Полностью успешно"
            else
              OVERALL_STATUS="⚠️ Частично успешно"
            fi
          else
            OVERALL_STATUS="❌ Все сборки провалены"
          fi
          
          # Создаем summary
          {
            echo "# 🚀 Релиз собран и загружен!"
            echo ""
            echo "## Информация о релизе"
            echo "- Репозиторий: ${{ needs.prepare.outputs.repository }}"
            echo "- Ветка: ${{ needs.prepare.outputs.branch }}"
            echo "- Тег: ${{ needs.prepare.outputs.release_tag }}"
            echo "- Версия: ${{ needs.prepare.outputs.build_name }}"
            echo "- Номер сборки: ${{ needs.prepare.outputs.build_number }}"
            echo "- Общий статус: $OVERALL_STATUS"
            echo ""
            echo "## Статусы сборки"
            echo ""
            echo "| Платформа | Статус |"
            echo "|-----------|--------|"
            echo "| Android | $ANDROID_STATUS |"
            echo "| iOS | $IOS_STATUS |"
            echo "| Linux | $LINUX_STATUS |"
            echo "| Windows | $WINDOWS_STATUS |"
            echo "| Web | $WEB_STATUS |"
            echo "| Загрузка в релиз | $UPLOAD_STATUS |"
            echo ""
            echo "## Ссылки"
            echo ""
            echo "- 🔗 [Релиз на GitHub](https://github.com/${{ github.repository }}/releases/tag/${{ needs.prepare.outputs.release_tag }})"
            echo "- 🔗 [Сборка в Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } >> $GITHUB_STEP_SUMMARY
      
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          token: ${{ secrets.tgTOKEN }}
          to: ${{ secrets.tgTO }}
          message: |
            🚀 **Flutter Release Build Complete!**
            
            📦 Репозиторий: ${{ needs.prepare.outputs.repository }}
            🌿 Ветка: ${{ needs.prepare.outputs.branch }}
            🏷️ Тег: ${{ needs.prepare.outputs.release_tag }}
            🔢 Версия: ${{ needs.prepare.outputs.build_name }} (build ${{ needs.prepare.outputs.build_number }})
            
            **Статусы сборки:**
            🤖 Android: ${{ needs.build-android.result }}
            🍎 iOS: ${{ needs.build-ios.result }}
            🐧 Linux: ${{ needs.build-linux.result }}
            🪟 Windows: ${{ needs.build-windows.result }}
            🌐 Web: ${{ needs.build-web.result }}
            📤 Загрузка в релиз: ${{ needs.upload-to-release.result }}
            
            🔗 [Ссылка на релиз](https://github.com/${{ github.repository }}/releases/tag/${{ needs.prepare.outputs.release_tag }})
            🔗 [Ссылка на сборку](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})