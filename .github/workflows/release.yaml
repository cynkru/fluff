name: Build Flutter Release (Manual)

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: 'Build name/version (e.g., 1.0.0)'
        required: true
        default: '1.0.0'
      build_number:
        description: 'Build number'
        required: true
        default: '1'
      platform:
        description: 'Platform to build'
        required: true
        type: choice
        options:
          - all
          - android
          - ios
          - linux
          - web
          - windows

env:
  FLUTTER_VERSION: '3.x'
  GRADLE_OPTS: -Xmx6g -Xms4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
  JAVA_OPTS: -Xmx6g -Xms4g -XX:MaxMetaspaceSize=1g

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      repository: ${{ steps.repo.outputs.repository }}
      branch: ${{ steps.repo.outputs.branch }}
      cache_key: ${{ steps.cache_key.outputs.key }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get repository info
        id: repo
        run: |
          echo "repository=${GITHUB_REPOSITORY}" >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
      
      - name: Generate cache key
        id: cache_key
        run: |
          if [ -f "pubspec.lock" ]; then
            CACHE_KEY="${{ runner.os }}-flutter-${{ hashFiles('pubspec.lock') }}"
          else
            CACHE_KEY="${{ runner.os }}-flutter-${{ hashFiles('pubspec.yaml') }}"
          fi
          echo "key=$CACHE_KEY" >> $GITHUB_OUTPUT

  build-android:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          java -version
          
      - name: Setup Android SDK
        uses: amyu/setup-android@v5
        with:
          sdk-version: '34'
          build-tools-version: '34.0.0'
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
    
      - name: Install dependencies
        run: flutter pub get
      
      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
      
      - name: Create key.properties
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "storeFile=keystore.jks" > android/key.properties
          echo "storePassword=$ANDROID_KEYSTORE_PASSWORD" >> android/key.properties
          echo "keyPassword=$ANDROID_KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$ANDROID_KEY_ALIAS" >> android/key.properties
      
      - name: Build Android APK (signed)
        run: |
          flutter build apk --release \
            --build-name=${{ github.event.inputs.build_name }} \
            --build-number=${{ github.event.inputs.build_number }}
      
      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

  build-ios:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ios' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
      
      - name: Install dependencies
        run: flutter pub get
        
      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update
      
      - name: Build iOS (release, no codesign)
        run: |
          flutter build ios --release --no-codesign
      
      - name: Create iOS artifact archive
        run: |
          cd build/ios/iphoneos
          zip -r ../../../ios-build.zip Runner.app
      
      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}
          path: ios-build.zip
          retention-days: 7

  build-linux:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsecret-1-dev \
            libjsoncpp-dev \
            liblzma-dev \
            pkg-config \
            libssl-dev \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libgl1-mesa-dev \
            libbz2-dev \
            libsqlite3-dev \
            libegl1-mesa-dev \
            libsecret-1-0
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
      
      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop
      
      - name: Clean
        run: |
          flutter clean
          rm -rf build/
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Create native assets directory
        run: |
          mkdir -p build/native_assets/linux
          echo "{}" > build/native_assets/linux/native_assets.yaml
      
      - name: Build Linux (release)
        run: |
          flutter build linux --release || \
          flutter build linux --release --no-native-assets
      
      - name: Create archive
        run: |
          if [ -d "build/linux/x64/release/bundle" ]; then
            cd build/linux/x64/release/bundle
            tar -czf ../../../../../linux-build.tar.gz .
          else
            echo "Build failed - no bundle found"
            exit 1
          fi
      
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}
          path: linux-build.tar.gz
          retention-days: 7

  build-windows:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
      
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build Windows (release)
        run: flutter build windows --release
      
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}
          path: build/windows/x64/runner/release/
          retention-days: 7

  build-web:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'web' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build Web (release)
        run: flutter build web --release
      
      - name: Upload Web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}
          path: build/web/
          retention-days: 7

  summary:
    needs: [prepare, build-android, build-ios, build-linux, build-windows, build-web]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      
      - name: Create build summary
        run: |
          ANDROID_STATUS="${{ needs.build-android.result }}"
          IOS_STATUS="${{ needs.build-ios.result }}"
          LINUX_STATUS="${{ needs.build-linux.result }}"
          WINDOWS_STATUS="${{ needs.build-windows.result }}"
          WEB_STATUS="${{ needs.build-web.result }}"
          
          if [[ "$ANDROID_STATUS" == "success" || "$IOS_STATUS" == "success" || "$LINUX_STATUS" == "success" || "$WINDOWS_STATUS" == "success" || "$WEB_STATUS" == "success" ]]; then
            if [[ "$ANDROID_STATUS" == "success" && "$IOS_STATUS" == "success" && "$LINUX_STATUS" == "success" && "$WINDOWS_STATUS" == "success" && "$WEB_STATUS" == "success" ]]; then
              OVERALL_STATUS="✅ Полностью успешно"
            else
              OVERALL_STATUS="⚠️ Частично успешно"
            fi
          else
            OVERALL_STATUS="❌ Все сборки провалены"
          fi
          
          {
            echo "# Build Complete"
            echo ""
            echo "## Repository Information"
            echo "- Repository: ${{ needs.prepare.outputs.repository }}"
            echo "- Branch: ${{ needs.prepare.outputs.branch }}"
            echo "- Build Name: ${{ github.event.inputs.build_name }}"
            echo "- Build Number: ${{ github.event.inputs.build_number }}"
            echo "- Overall Status: $OVERALL_STATUS"
            echo ""
            echo "## Build Status"
            echo ""
            echo "| Platform | Status |"
            echo "|----------|--------|"
            echo "| Android | $ANDROID_STATUS |"
            echo "| iOS | $IOS_STATUS |"
            echo "| Linux | $LINUX_STATUS |"
            echo "| Windows | $WINDOWS_STATUS |"
            echo "| Web | $WEB_STATUS |"
          } >> $GITHUB_STEP_SUMMARY
      
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          token: ${{ secrets.tgTOKEN }}
          to: ${{ secrets.tgTO }}
          message: |
            🚀 **Flutter Build Report**
            
            📦 Репозиторий: ${{ needs.prepare.outputs.repository }}
            🌿 Ветка: ${{ needs.prepare.outputs.branch }}
            🏷️ Версия: ${{ github.event.inputs.build_name }} (build ${{ github.event.inputs.build_number }})
            
            **Статусы сборки:**
            🤖 Android: ${{ needs.build-android.result }}
            🍎 iOS: ${{ needs.build-ios.result }}
            🐧 Linux: ${{ needs.build-linux.result }}
            🪟 Windows: ${{ needs.build-windows.result }}
            🌐 Web: ${{ needs.build-web.result }}
            
            🔗 [Ссылка на сборку](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})