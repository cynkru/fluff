name: Build Flutter App (Release)

on:
  # Автоматический запуск при создании релиза
  release:
    types: [published]

env:
  FLUTTER_VERSION: '3.x'
  # Увеличиваем память для всех Gradle операций
  GRADLE_OPTS: -Xmx6g -Xms4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
  JAVA_OPTS: -Xmx6g -Xms4g -XX:MaxMetaspaceSize=1g

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      repository: ${{ steps.repo.outputs.repository }}
      branch: ${{ steps.repo.outputs.branch }}
      cache_key: ${{ steps.cache_key.outputs.key }}
      build_name: ${{ steps.version.outputs.build_name }}
      build_number: ${{ steps.version.outputs.build_number }}
      release_tag: ${{ steps.release.outputs.tag }}
      release_name: ${{ steps.release.outputs.name }}
      release_body: ${{ steps.release.outputs.body }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get repository info
        id: repo
        run: |
          echo "repository=${GITHUB_REPOSITORY}" >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
      
      - name: Get release info
        id: release
        run: |
          # Извлекаем версию из тега релиза (убираем 'v' если есть)
          VERSION="${GITHUB_REF_NAME#v}"
          echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          echo "name=${{ github.event.release.name }}" >> $GITHUB_OUTPUT
          echo "body=${{ github.event.release.body }}" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
      - name: Set version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "build_name=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT
          echo "Using release version: $VERSION (build ${GITHUB_RUN_NUMBER})"
      
      - name: Generate cache key
        id: cache_key
        run: |
          # Создаем ключ кеша на основе pubspec.lock и важных файлов
          if [ -f "pubspec.lock" ]; then
            CACHE_KEY="${{ runner.os }}-flutter-${{ hashFiles('pubspec.lock') }}"
          else
            CACHE_KEY="${{ runner.os }}-flutter-${{ hashFiles('pubspec.yaml') }}"
          fi
          echo "key=$CACHE_KEY" >> $GITHUB_OUTPUT
          echo "Cache key: $CACHE_KEY"

  build-android:
    needs: prepare
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
    
      # Ставим Java 17 для Gradle (основная)
      - name: Setup Java
        run: |
          # Проверяем, установлена ли Java 17
          if ! java -version 2>&1 | grep -q "version \"17"; then
            echo "Java 17 not found, installing..."
            sudo apt update
            sudo apt install -y openjdk-17-jdk
          else
            echo "Java 17 already installed"
          fi
          
          # Устанавливаем JAVA_HOME
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> ~/.bashrc
          
          # Проверяем версию
          java -version
          javac -version
            
      - name: Setup Android SDK
        uses: amyu/setup-android@v5
        with:
          sdk-version: '34'
          build-tools-version: '34.0.0'
          
      - name: Accept Android licenses
        run: |
          # Создаем папку для лицензий если её нет
          mkdir -p ~/.android
          
          # Принимаем все лицензии автоматически
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          # Создаем файл с принятыми лицензиями
          touch ~/.android/repositories.cfg
          
          echo "Android licenses accepted"
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
    
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
    
      - name: Install dependencies
        run: flutter pub get
    
      # Обновляем receive_sharing_intent до последней версии
      - name: Update receive_sharing_intent
        run: |
          # Форсируем последнюю версию плагина
          flutter pub upgrade receive_sharing_intent
    
      # Конфигурируем для совместимости
      - name: Configure compatibility
        run: |
          # Создаем gradle.properties с явным указанием Java для компиляции
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties << EOF
          org.gradle.jvmargs=-Xmx4608m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8
          org.gradle.daemon=false
          org.gradle.parallel=true
          org.gradle.workers.max=2
          android.useAndroidX=true
          android.enableJetifier=true
        
          # Явно указываем Java 11 для компиляции Kotlin/Java кода
          # но Gradle сам остается на Java 17
          kotlin.jvm.target=11
          EOF
        
          # Патчим build.gradle.kts если нужно
          if [ -f "android/app/build.gradle.kts" ]; then
            # Добавляем совместимость в kotlinOptions
            sed -i '/android {/a \ \ \ \ compileOptions {\n\ \ \ \ \ \ \ \ sourceCompatibility = JavaVersion.VERSION_11\n\ \ \ \ \ \ \ \ targetCompatibility = JavaVersion.VERSION_11\n\ \ \ \ }\n\ \ \ \ kotlinOptions {\n\ \ \ \ \ \ \ \ jvmTarget = "11"\n\ \ \ \ }' android/app/build.gradle.kts
          fi
    
      # Сборка релизной версии
      - name: Build Android APK (Release)
        run: |
          flutter build apk --release \
            --build-name=${{ needs.prepare.outputs.build_name }} \
            --build-number=${{ needs.prepare.outputs.build_number }}
      
      - name: Upload Android APK to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/apk/release/app-release.apk
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
      # Если упало - пробуем с форсированной совместимостью
      - name: Fallback with compatibility flags
        if: failure()
        run: |
          # Пробуем явно указать Java 11 для тасков
          cd android
          ./gradlew assembleRelease \
            -Dorg.gradle.java.home=/opt/hostedtoolcache/Java_Zulu_jdk/11.0.30-7/x64 \
            -Pkotlin.jvm.target=11 \
            --max-workers=2 \
            --no-daemon
          
          # Загружаем если удалось
          cd ..
      
      - name: Upload Android APK from fallback
        if: failure() && success()  # Эта проверка не совсем корректна, но оставим для логики
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/apk/release/app-release.apk
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ios:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
      
      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
            .flutter-plugins
            .flutter-plugins-dependencies
          key: ${{ needs.prepare.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-flutter-
      
      - name: Install dependencies
        run: flutter pub get
        
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/.cocoapods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-
      
      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update || pod install --verbose
      
      - name: Build iOS (release, no codesign)
        run: |
          flutter build ios --release --no-codesign \
            --build-name=${{ needs.prepare.outputs.build_name }} \
            --build-number=${{ needs.prepare.outputs.build_number }} \
            --verbose
          
          # Создаем ZIP архив с билдом
          cd build/ios/iphoneos
          zip -r ../../../ios-${{ needs.prepare.outputs.build_name }}.zip Runner.app
      
      - name: Upload iOS to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ios-${{ needs.prepare.outputs.build_name }}.zip
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
            .flutter-plugins
            .flutter-plugins-dependencies
          key: ${{ needs.prepare.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-flutter-
      
      - name: Install all Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsecret-1-dev \
            libjsoncpp-dev \
            liblzma-dev \
            pkg-config \
            libssl-dev \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libgl1-mesa-dev
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
          
      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop
        
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Linux (release)
        run: |
          flutter build linux --release
          
          # Создаем tar.gz архив
          if [ -d "build/linux/x64/release/bundle" ]; then
            cd build/linux/x64/release
            tar -czf ../../../linux-${{ needs.prepare.outputs.build_name }}.tar.gz bundle/
          fi
      
      - name: Upload Linux to Release
        uses: softprops/action-gh-release@v1
        with:
          files: linux-${{ needs.prepare.outputs.build_name }}.tar.gz
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~\.pub-cache
            .dart_tool
            .flutter-plugins
            .flutter-plugins-dependencies
          key: ${{ needs.prepare.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-flutter-
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
          
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop
        
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Windows (release)
        run: |
          flutter build windows --release
          
          # Создаем ZIP архив
          if (Test-Path "build\windows\x64\runner\Release") {
            Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "windows-${{ needs.prepare.outputs.build_name }}.zip" -Force
          }
      
      - name: Upload Windows to Release
        uses: softprops/action-gh-release@v1
        with:
          files: windows-${{ needs.prepare.outputs.build_name }}.zip
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-web:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
            .flutter-plugins
            .flutter-plugins-dependencies
          key: ${{ needs.prepare.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-flutter-
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Web (release)
        run: |
          flutter build web --release
          
          # Создаем архив
          cd build/web
          zip -r ../../web-${{ needs.prepare.outputs.build_name }}.zip .
      
      - name: Upload Web to Release
        uses: softprops/action-gh-release@v1
        with:
          files: web-${{ needs.prepare.outputs.build_name }}.zip
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  summary:
    needs: [prepare, build-android, build-ios, build-linux, build-windows, build-web]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Create build summary
        run: |
          # Собираем статусы
          ANDROID_STATUS="${{ needs.build-android.result }}"
          IOS_STATUS="${{ needs.build-ios.result }}"
          LINUX_STATUS="${{ needs.build-linux.result }}"
          WINDOWS_STATUS="${{ needs.build-windows.result }}"
          WEB_STATUS="${{ needs.build-web.result }}"
          
          # Определяем общий статус
          if [[ "$ANDROID_STATUS" == "success" || "$IOS_STATUS" == "success" || "$LINUX_STATUS" == "success" || "$WINDOWS_STATUS" == "success" || "$WEB_STATUS" == "success" ]]; then
            if [[ "$ANDROID_STATUS" == "success" && "$IOS_STATUS" == "success" && "$LINUX_STATUS" == "success" && "$WINDOWS_STATUS" == "success" && "$WEB_STATUS" == "success" ]]; then
              OVERALL_STATUS="✅ Полностью успешно"
            else
              OVERALL_STATUS="⚠️ Частично успешно"
            fi
          else
            OVERALL_STATUS="❌ Все сборки провалены"
          fi
          
          # Создаем summary
          {
            echo "# 🚀 Релиз собран и загружен!"
            echo ""
            echo "## Информация о релизе"
            echo "- Репозиторий: ${{ needs.prepare.outputs.repository }}"
            echo "- Ветка: ${{ needs.prepare.outputs.branch }}"
            echo "- Тег: ${{ needs.prepare.outputs.release_tag }}"
            echo "- Версия: ${{ needs.prepare.outputs.build_name }}"
            echo "- Номер сборки: ${{ needs.prepare.outputs.build_number }}"
            echo "- Общий статус: $OVERALL_STATUS"
            echo ""
            echo "## Статусы сборки"
            echo ""
            echo "| Платформа | Статус |"
            echo "|-----------|--------|"
            echo "| Android | $ANDROID_STATUS |"
            echo "| iOS | $IOS_STATUS |"
            echo "| Linux | $LINUX_STATUS |"
            echo "| Windows | $WINDOWS_STATUS |"
            echo "| Web | $WEB_STATUS |"
            echo ""
            echo "## Ссылки"
            echo ""
            echo "- 🔗 [Релиз на GitHub](https://github.com/${{ github.repository }}/releases/tag/${{ needs.prepare.outputs.release_tag }})"
            echo "- 🔗 [Сборка в Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } >> $GITHUB_STEP_SUMMARY
      
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          token: ${{ secrets.tgTOKEN }}
          to: ${{ secrets.tgTO }}
          message: |
            🚀 **Flutter Release Build Complete!**
            
            📦 Репозиторий: ${{ needs.prepare.outputs.repository }}
            🌿 Ветка: ${{ needs.prepare.outputs.branch }}
            🏷️ Тег: ${{ needs.prepare.outputs.release_tag }}
            🔢 Версия: ${{ needs.prepare.outputs.build_name }} (build ${{ needs.prepare.outputs.build_number }})
            
            **Статусы сборки:**
            🤖 Android: ${{ needs.build-android.result }}
            🍎 iOS: ${{ needs.build-ios.result }}
            🐧 Linux: ${{ needs.build-linux.result }}
            🪟 Windows: ${{ needs.build-windows.result }}
            🌐 Web: ${{ needs.build-web.result }}
            
            🔗 [Ссылка на релиз](https://github.com/${{ github.repository }}/releases/tag/${{ needs.prepare.outputs.release_tag }})
            🔗 [Ссылка на сборку](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})