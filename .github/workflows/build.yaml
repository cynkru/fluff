name: Build Flutter App (Manual)

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: 'Build name/version (e.g., 1.0.0)'
        required: true
        default: '1.0.0'
      build_number:
        description: 'Build number'
        required: true
        default: '1'
      platform:
        description: 'Platform to build'
        required: true
        type: choice
        options:
          - all
          - android
          - ios
          - linux
          - web
          - windows

env:
  FLUTTER_VERSION: '3.x'
  # Увеличиваем память для всех Gradle операций
  GRADLE_OPTS: -Xmx6g -Xms4g -XX:MaxMetaspaceSize=1g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
  JAVA_OPTS: -Xmx6g -Xms4g -XX:MaxMetaspaceSize=1g

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      repository: ${{ steps.repo.outputs.repository }}
      branch: ${{ steps.repo.outputs.branch }}
      cache_key: ${{ steps.cache_key.outputs.key }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get repository info
        id: repo
        run: |
          echo "repository=${GITHUB_REPOSITORY}" >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
      
      - name: Generate cache key
        id: cache_key
        run: |
          # Создаем ключ кеша на основе pubspec.lock и важных файлов
          if [ -f "pubspec.lock" ]; then
            CACHE_KEY="${{ runner.os }}-flutter-${{ hashFiles('pubspec.lock') }}"
          else
            CACHE_KEY="${{ runner.os }}-flutter-${{ hashFiles('pubspec.yaml') }}"
          fi
          echo "key=$CACHE_KEY" >> $GITHUB_OUTPUT
          echo "Cache key: $CACHE_KEY"

  build-android:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android' }}
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
    
      # Ставим Java 17 для Gradle (основная)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17.0.14'
      
      - name: Setup Android SDK
        uses: amyu/setup-android@v5
        with:
          sdk-version: '34'
          build-tools-version: '34.0.0'
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
    
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
    
      - name: Install dependencies
        run: flutter pub get
    
      # Обновляем receive_sharing_intent до последней версии
      - name: Update receive_sharing_intent
        run: |
          # Форсируем последнюю версию плагина
          flutter pub upgrade receive_sharing_intent
    
      # Конфигурируем для совместимости
      - name: Configure compatibility
        run: |
          # Создаем gradle.properties с явным указанием Java для компиляции
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties << EOF
          org.gradle.jvmargs=-Xmx4608m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8
          org.gradle.daemon=false
          org.gradle.parallel=true
          org.gradle.workers.max=2
          android.useAndroidX=true
          android.enableJetifier=true
        
          # Явно указываем Java 11 для компиляции Kotlin/Java кода
          # но Gradle сам остается на Java 17
          kotlin.jvm.target=11
          EOF
        
          # Патчим build.gradle.kts если нужно
          if [ -f "android/app/build.gradle.kts" ]; then
            # Добавляем совместимость в kotlinOptions
            sed -i '/android {/a \ \ \ \ compileOptions {\n\ \ \ \ \ \ \ \ sourceCompatibility = JavaVersion.VERSION_11\n\ \ \ \ \ \ \ \ targetCompatibility = JavaVersion.VERSION_11\n\ \ \ \ }\n\ \ \ \ kotlinOptions {\n\ \ \ \ \ \ \ \ jvmTarget = "11"\n\ \ \ \ }' android/app/build.gradle.kts
          fi
    
      # Пробуем собрать
      - name: Build Android APK
        run: flutter build apk --debug
    
      # Если упало - пробуем с форсированной совместимостью
      - name: Fallback with compatibility flags
        if: failure()
        run: |
          # Пробуем явно указать Java 11 для тасков
          cd android
          ./gradlew assembleDebug \
            -Dorg.gradle.java.home=/opt/hostedtoolcache/Java_Zulu_jdk/11.0.30-7/x64 \
            -Pkotlin.jvm.target=11 \
            --max-workers=2 \
            --no-daemon
    
      - name: Upload Android artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}
          path: |
            build/app/outputs/flutter-apk/*.apk
            android/app/build/outputs/apk/**/*.apk
          retention-days: 7
  build-ios:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ios' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
      
      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
            .flutter-plugins
            .flutter-plugins-dependencies
          key: ${{ needs.prepare.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-flutter-
      
      - name: Install dependencies
        run: flutter pub get
        
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/.cocoapods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-
      
      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update || pod install --verbose
      
      - name: Build iOS (debug, no codesign)
        run: |
          flutter build ios --debug --no-codesign \
            --verbose
      
      - name: Create iOS artifact archive
        run: |
          cd build/ios/iphoneos
          zip -r ../../../ios-build.zip Runner.app
      
      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}
          path: ios-build.zip
          retention-days: 7

  # Остальные jobs (build-linux, build-windows, build-web) остаются без изменений
  # с добавлением улучшенного кеширования по аналогии с iOS

  build-linux:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
            .flutter-plugins
            .flutter-plugins-dependencies
          key: ${{ needs.prepare.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-flutter-
      
      - name: Install all Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsecret-1-dev \
            libjsoncpp-dev \
            liblzma-dev \
            pkg-config \
            libssl-dev \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libgl1-mesa-dev
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
          
      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop
        
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Linux (debug)
        run: flutter build linux --debug
        
      - name: Create tar.gz archive
        run: |
          if [ -d "build/linux/x64/debug/bundle" ]; then
            cd build/linux/x64/debug/bundle
            tar -czf ../../../../../linux-build.tar.gz .
          fi
          
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}
          path: linux-build.tar.gz
          retention-days: 7
          if-no-files-found: ignore

  build-windows:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~\.pub-cache
            .dart_tool
            .flutter-plugins
            .flutter-plugins-dependencies
          key: ${{ needs.prepare.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-flutter-
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
          
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop
        
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Windows (debug)
        run: flutter build windows --debug
        
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}
          path: build/windows/x64/runner/Debug/
          retention-days: 7

  build-web:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'web' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
            .flutter-plugins
            .flutter-plugins-dependencies
          key: ${{ needs.prepare.outputs.cache_key }}
          restore-keys: |
            ${{ runner.os }}-flutter-
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: ${{ needs.prepare.outputs.cache_key }}
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Web (debug)
        run: flutter build web --debug
        
      - name: Upload Web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ github.event.inputs.build_name }}-${{ github.event.inputs.build_number }}
          path: build/web/
          retention-days: 7

  summary:
    needs: [prepare, build-android, build-ios, build-linux, build-windows, build-web]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          
      - name: Create build summary
        run: |
          # Собираем статусы
          ANDROID_STATUS="${{ needs.build-android.result }}"
          IOS_STATUS="${{ needs.build-ios.result }}"
          LINUX_STATUS="${{ needs.build-linux.result }}"
          WINDOWS_STATUS="${{ needs.build-windows.result }}"
          WEB_STATUS="${{ needs.build-web.result }}"
          
          # Определяем общий статус
          if [[ "$ANDROID_STATUS" == "success" || "$IOS_STATUS" == "success" || "$LINUX_STATUS" == "success" || "$WINDOWS_STATUS" == "success" || "$WEB_STATUS" == "success" ]]; then
            if [[ "$ANDROID_STATUS" == "success" && "$IOS_STATUS" == "success" && "$LINUX_STATUS" == "success" && "$WINDOWS_STATUS" == "success" && "$WEB_STATUS" == "success" ]]; then
              OVERALL_STATUS="✅ Полностью успешно"
            else
              OVERALL_STATUS="⚠️ Частично успешно"
            fi
          else
            OVERALL_STATUS="❌ Все сборки провалены"
          fi
          
          # Создаем summary
          {
            echo "# Build Complete"
            echo ""
            echo "## Repository Information"
            echo "- Repository: ${{ needs.prepare.outputs.repository }}"
            echo "- Branch: ${{ needs.prepare.outputs.branch }}"
            echo "- Build Name: ${{ github.event.inputs.build_name }}"
            echo "- Build Number: ${{ github.event.inputs.build_number }}"
            echo "- Overall Status: $OVERALL_STATUS"
            echo "- Cache Key: ${{ needs.prepare.outputs.cache_key }}"
            echo ""
            echo "## Build Status"
            echo ""
            echo "| Platform | Status | Artifacts |"
            echo "|----------|--------|-----------|"
            echo "| Android | $ANDROID_STATUS | [Download](#) |"
            echo "| iOS | $IOS_STATUS | [Download](#) |"
            echo "| Linux | $LINUX_STATUS | [Download](#) |"
            echo "| Windows | $WINDOWS_STATUS | [Download](#) |"
            echo "| Web | $WEB_STATUS | [Download](#) |"
            echo ""
            echo "## Available Artifacts"
            echo ""
            if [ -d "artifacts" ] && [ "$(ls -A artifacts)" ]; then
              echo "✅ Artifacts created:" >> $GITHUB_STEP_SUMMARY
              ls -la artifacts/ >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️ No artifacts were created"
            fi
          } >> $GITHUB_STEP_SUMMARY
      
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          token: ${{ secrets.tgTOKEN }}
          to: ${{ secrets.tgTO }}
          message: |
            🚀 **Flutter Build Report**
            
            📦 Репозиторий: ${{ needs.prepare.outputs.repository }}
            🌿 Ветка: ${{ needs.prepare.outputs.branch }}
            🏷️ Версия: ${{ github.event.inputs.build_name }} (build ${{ github.event.inputs.build_number }})
            🔑 Cache Key: ${{ needs.prepare.outputs.cache_key }}
            
            **Статусы сборки:**
            🤖 Android: ${{ needs.build-android.result }}
            🍎 iOS: ${{ needs.build-ios.result }}
            🐧 Linux: ${{ needs.build-linux.result }}
            🪟 Windows: ${{ needs.build-windows.result }}
            🌐 Web: ${{ needs.build-web.result }}
            
            🔗 [Ссылка на сборку](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
