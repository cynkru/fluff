name: Build Flutter App (Manual)

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: 'Build name/version (e.g., 1.0.0)'
        required: true
        default: '1.0.0'
      build_number:
        description: 'Build number'
        required: true
        default: '1'
      platform:
        description: 'Platform to build'
        required: true
        type: choice
        options:
          - all
          - android
          - ios
          - linux
          - web
          - windows

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      repository: ${{ steps.repo.outputs.repository }}
      branch: ${{ steps.repo.outputs.branch }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get repository info
        id: repo
        run: |
          echo "repository=${GITHUB_REPOSITORY}" >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

  build-android:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
          
      - name: Clean disk space
        run: |
          echo "=== Free space before cleanup ==="
          df -h
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker rmi $(docker image ls -q) 2>/dev/null || true
          echo "=== Free space after cleanup ==="
          df -h
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Clean previous builds
        run: |
          rm -rf build/
          rm -rf ~/.gradle/caches/
          echo "=== Free space after cleaning builds ==="
          df -h
          
      - name: Build Android APK (debug) - armeabi-v7a only
        run: |
          export GRADLE_OPTS="-Xmx2048m -Dorg.gradle.jvmargs=-Xmx2048m"
          # Собираем только для одной архитектуры, чтобы меньше места занимало
          flutter build apk --debug --target-platform=android-arm
        continue-on-error: true
        
      - name: Check for APK files
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f | tee apk_files.txt
          echo "=== Found APKs ==="
          cat apk_files.txt || echo "No APK files found"
          
      - name: Upload Android artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            **/app-armeabi-v7a-debug.apk
            **/app-debug.apk
          retention-days: 7
          if-no-files-found: warn

  build-ios:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ios' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build iOS (debug, no codesign)
        run: flutter build ios --debug --no-codesign
        
      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphoneos/Runner.app
          retention-days: 7

  build-linux:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install all Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            ninja-build \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsecret-1-dev \
            libjsoncpp-dev \
            liblzma-dev \
            pkg-config \
            libssl-dev \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libgl1-mesa-dev
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
          
      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop
        
      - name: Clean previous builds
        run: |
          rm -rf build/linux
          rm -rf .dart_tool
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Linux (debug)
        run: flutter build linux --debug
        continue-on-error: true
        
      - name: Create tar.gz archive
        if: success() || failure()
        run: |
          if [ -d "build/linux/x64/debug/bundle" ]; then
            cd build/linux/x64/debug/bundle
            tar -czf ../../../../../linux-build.tar.gz .
            echo "✅ Linux build created successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "::warning::Linux build directory not found"
          fi
          
      - name: Upload Linux artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: linux-build.tar.gz
          retention-days: 7
          if-no-files-found: ignore

  build-windows:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
          
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop
        
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Windows (debug)
        run: flutter build windows --debug
        
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/x64/runner/Debug/
          retention-days: 7

  build-web:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'web' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Web (debug)
        run: flutter build web --debug
        
      - name: Upload Web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
          retention-days: 7

  summary:
    needs: [prepare, build-android, build-ios, build-linux, build-windows, build-web]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          
      - name: Create build summary and Telegram message
        id: build_summary
        run: |
          # Собираем статусы
          ANDROID_STATUS="${{ needs.build-android.result }}"
          IOS_STATUS="${{ needs.build-ios.result }}"
          LINUX_STATUS="${{ needs.build-linux.result }}"
          WINDOWS_STATUS="${{ needs.build-windows.result }}"
          WEB_STATUS="${{ needs.build-web.result }}"
          
          # Определяем общий статус
          if [[ "$ANDROID_STATUS" == "success" || "$IOS_STATUS" == "success" || "$LINUX_STATUS" == "success" || "$WINDOWS_STATUS" == "success" || "$WEB_STATUS" == "success" ]]; then
            OVERALL_STATUS="✅ Частично успешно"
            if [[ "$ANDROID_STATUS" == "success" && "$IOS_STATUS" == "success" && "$LINUX_STATUS" == "success" && "$WINDOWS_STATUS" == "success" && "$WEB_STATUS" == "success" ]]; then
              OVERALL_STATUS="✅ Полностью успешно"
            fi
          else
            OVERALL_STATUS="❌ Все сборки провалены"
          fi
          
          # Создаем summary в GitHub
          echo "# Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Repository Information" >> $GITHUB_STEP_SUMMARY
          echo "- Repository: ${{ needs.prepare.outputs.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ needs.prepare.outputs.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build Name: ${{ github.event.inputs.build_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build Number: ${{ github.event.inputs.build_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- Overall Status: $OVERALL_STATUS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Status" >> $GITHUB_STEP_SUMMARY
          
          echo "| Platform | Status | Artifacts |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Android | $ANDROID_STATUS | APK |" >> $GITHUB_STEP_SUMMARY
          echo "| iOS | $IOS_STATUS | .app |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux | $LINUX_STATUS | tar.gz |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows | $WINDOWS_STATUS | EXE/DLLs |" >> $GITHUB_STEP_SUMMARY
          echo "| Web | $WEB_STATUS | HTML/JS |" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Available Artifacts" >> $GITHUB_STEP_SUMMARY
          
          if [ -d "artifacts" ] && [ "$(ls -A artifacts)" ]; then
            echo "✅ Artifacts downloaded successfully:" >> $GITHUB_STEP_SUMMARY
            ls -la artifacts/ >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No artifacts were created or all builds failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## GitHub Run Link" >> $GITHUB_STEP_SUMMARY
          echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          
      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          token: ${{ secrets.tgTOKEN }}
          to: ${{ secrets.tgTO }}
          message: |
            🚀 Flutter Build Report
            Репозиторий: ${{ needs.prepare.outputs.repository }}
            Ветка: ${{ needs.prepare.outputs.branch }}
            Версия: ${{ github.event.inputs.build_name }} (build ${{ github.event.inputs.build_number }})
            
            Статусы:
            🤖 Android: ${{ needs.build-android.result }}
            🍎 iOS: ${{ needs.build-ios.result }}
            🐧 Linux: ${{ needs.build-linux.result }}
            🪟 Windows: ${{ needs.build-windows.result }}
            🌐 Web: ${{ needs.build-web.result }}
            
            🔗 Ссылка: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
