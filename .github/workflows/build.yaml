name: Build Flutter App (Manual)

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: 'Build name/version (e.g., 1.0.0)'
        required: true
        default: '1.0.0'
      build_number:
        description: 'Build number'
        required: true
        default: '1'
      platform:
        description: 'Platform to build'
        required: true
        type: choice
        options:
          - all
          - android
          - ios
          - linux
          - macos
          - web
          - windows
          - snap

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      repository: ${{ steps.repo.outputs.repository }}
      branch: ${{ steps.repo.outputs.branch }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get repository info
        id: repo
        run: |
          echo "repository=${GITHUB_REPOSITORY}" >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

  build-android:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Android APK
        run: flutter build apk --release --build-name=${{ github.event.inputs.build_name }} --build-number=${{ github.event.inputs.build_number }}
        
      - name: Build Android App Bundle
        run: flutter build appbundle --release --build-name=${{ github.event.inputs.build_name }} --build-number=${{ github.event.inputs.build_number }}
        
      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  build-ios:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ios' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build iOS
        run: flutter build ios --release --no-codesign --build-name=${{ github.event.inputs.build_name }} --build-number=${{ github.event.inputs.build_number }}
        
      - name: Create IPA
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          mv Runner.app Payload/
          zip -r app.ipa Payload
          
      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphoneos/app.ipa

  build-linux:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
          
      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop
        
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Linux
        run: flutter build linux --release --build-name=${{ github.event.inputs.build_name }} --build-number=${{ github.event.inputs.build_number }}
        
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/linux/x64/release/bundle/

  build-snap:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'snap' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Snapcraft
        run: sudo snap install snapcraft --classic
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Linux (for Snap)
        run: flutter build linux --release
        
      - name: Build Snap
        run: snapcraft
        
      - name: Upload Snap artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snap-build
          path: "*.snap"

  build-windows:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
          
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop
        
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Windows
        run: flutter build windows --release --build-name=${{ github.event.inputs.build_name }} --build-number=${{ github.event.inputs.build_number }}
        
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/x64/runner/Release/

  build-web:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'web' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Web
        run: flutter build web --release --web-renderer html --base-href "/"
        
      - name: Upload Web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/

  build-macos:
    needs: prepare
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true
          
      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop
        
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build macOS
        run: flutter build macos --release --build-name=${{ github.event.inputs.build_name }} --build-number=${{ github.event.inputs.build_number }}
        
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: build/macos/Build/Products/Release/

  summary:
    needs: [prepare, build-android, build-ios, build-linux, build-snap, build-windows, build-web, build-macos]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          
      - name: Create build summary
        run: |
          echo "# Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Repository Information" >> $GITHUB_STEP_SUMMARY
          echo "- Repository: ${{ needs.prepare.outputs.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ needs.prepare.outputs.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build Name: ${{ github.event.inputs.build_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build Number: ${{ github.event.inputs.build_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Artifacts" >> $GITHUB_STEP_SUMMARY
          
          if [ -d "artifacts" ]; then
            ls -la artifacts/ >> $GITHUB_STEP_SUMMARY
          else
            echo "No artifacts were created" >> $GITHUB_STEP_SUMMARY
          fi
